<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CRM Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background: linear-gradient(135deg, #0d6efd, #6c757d);
      height: 100vh;
    }

    .login-card {
      width: 350px;
      border-radius: 15px;
    }

    .login-title {
      font-weight: 600;
    }

    .btn-login {
      background-color: #0d6efd;
      transition: 0.3s;
    }

    .btn-login:hover {
      background-color: #0b5ed7;
    }
  </style>
</head>

<body class="d-flex justify-content-center align-items-center">

  <div class="card shadow p-4 login-card">
    <h4 class="text-center mb-3 login-title">CRM Login</h4>

    <!-- Login Form -->
    <form action="login_process.php" method="POST">

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" name="email" placeholder="Enter email" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" placeholder="Enter password" required>
      </div>

      <button type="submit" class="btn btn-login w-100 text-white">Login</button>

    </form>

    <!-- Optional Message Area -->
    <div class="mt-3 text-center text-danger">
      <!-- You can show PHP error here later -->
    </div>

  </div>

</body>
</html>
